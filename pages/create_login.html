<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>SB Vets MMS</title>
	<link rel="stylesheet" href="../styles/main.css">
</head>

<body>
	<div class="header">
		<h1><a href="../index.html">SB Vets Memorial Management System</a></h1>
	</div>
	
	<div class="create">
		<h2>Create Login Credentials</h2>
		
		<form>
			<div class="row">
				<input type="text" class="account" placeholder="First Name: ">
				<input type="text" class="account" placeholder="Username: ">
			</div>
			
			<div class="row">
				<input type="text" class="account" placeholder="Last Name: ">
				<input type="password" class="account" placeholder="Password: ">
			</div>
			
			<div class="row-check">
				<label class="checkbox">
					<input type="checkbox"> Admin
				</label>

				<label>
					<input type="text" class="input" placeholder="UNCW ID: " />
				</label>
				
			</div>
				
			<div class="row check">
				<label class="checkbox">
					<input type="checkbox"> Data Entry
				</label>
			
				<label>
				  <input type="text" class="input" placeholder="Employee ID: ">
				</label>
			</div>	
				
				
			<button type="submit" class="login-btn">Create</button>
		</form>

</body>
</html>
